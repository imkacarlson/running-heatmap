[pytest]
# Expert pytest configuration using markers
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --disable-warnings
markers =
    mobile: Mobile app tests using Appium and session-scoped fixtures
    core: Core essential tests (streamlined test suite)
    legacy: Legacy tests (excluded from default runs) 
    integration: End-to-end integration tests
    unit: Unit tests
    smoke: Fast smoke tests for rapid development feedback (< 5 seconds)
    smoke_data: Smoke tests for data pipeline components
    smoke_server: Smoke tests for server startup and basic functionality
    smoke_api: Smoke tests for API endpoints
    smoke_web: Smoke tests for web interface
    smoke_build: Smoke tests for mobile build process
    smoke_mobile: Smoke tests for mobile-specific components